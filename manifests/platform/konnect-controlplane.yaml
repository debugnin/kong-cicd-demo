apiVersion: konnect.konghq.com/v1alpha1
kind: KonnectGatewayControlPlane
metadata:
  name: kong-cicd-demo
  namespace: kong
spec:
  name: kong-cicd-demo
  description: Konnect control plane for the kong-cicd-demo reference pipeline.
  cluster_type: CLUSTER_TYPE_CONTROL_PLANE
  auth_type: pinned_client_certs
  labels:
    managed_by: kong-cicd-demo
    env: demo
  konnect:
    authRef:
      # Resolves to the KonnectAPIAuthConfiguration in the same namespace.
      # That object carries the Konnect token + serverURL (AU region).
      name: konnect-api-auth
