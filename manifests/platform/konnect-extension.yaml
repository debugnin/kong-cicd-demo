apiVersion: konnect.konghq.com/v1alpha2
kind: KonnectExtension
metadata:
  name: konnect-extension
  namespace: kong
spec:
  konnect:
    controlPlane:
      ref:
        type: konnectNamespacedRef
        konnectNamespacedRef:
          # Refers to the KonnectGatewayControlPlane CR declared in
          # konnect-controlplane.yaml (same namespace). The auth ref
          # lives on that ControlPlane, not on this extension.
          name: kong-cicd-demo
  clientAuth:
    certificateSecret:
      provisioning: Automatic
