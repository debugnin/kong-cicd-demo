apiVersion: gateway-operator.konghq.com/v2beta1
kind: GatewayConfiguration
metadata:
  name: kong-configuration
  namespace: kong
spec:
  konnect:
    authRef:
      name: konnect-api-auth
  dataPlaneOptions:
    # Service defaults to LoadBalancer — works on EKS/GKE/AKS out of the box.
    # For a local kind cluster, override this overlay to switch to NodePort
    # with a fixed nodePort and add a matching extraPortMappings to kind.
    deployment:
      podTemplateSpec:
        spec:
          containers:
            - name: proxy
              # Resources are intentionally minimal for kind on GitHub-hosted runners.
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
