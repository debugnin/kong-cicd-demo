apiVersion: gateway-operator.konghq.com/v1beta1
kind: GatewayConfiguration
metadata:
  name: kong-configuration
  namespace: kong
spec:
  dataPlaneOptions:
    extensions:
      - kind: KonnectExtension
        group: konnect.konghq.com
        name: konnect-extension
    network:
      services:
        ingress:
          # Pin the proxy Service to NodePort 30080 so kind's extraPortMappings
          # (host 8080 -> container 30080) exposes the gateway on localhost:8080.
          type: NodePort
          ports:
            - name: http
              port: 80
              targetPort: 8000
              nodePort: 30080
    deployment:
      podTemplateSpec:
        spec:
          containers:
            - name: proxy
              # Resources are intentionally minimal for kind on GitHub-hosted runners.
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
