apiVersion: gateway-operator.konghq.com/v2beta1
kind: GatewayConfiguration
metadata:
  name: kong-configuration
  namespace: kong
spec:
  # KonnectExtension is attached at the GatewayConfiguration top level
  # (v2beta1); under spec.dataPlaneOptions.extensions the webhook rejects
  # it with "KonnectExtension must be set at the Gateway level".
  extensions:
    - kind: KonnectExtension
      group: konnect.konghq.com
      name: konnect-extension
  dataPlaneOptions:
    # Service defaults to LoadBalancer — works on EKS/GKE/AKS out of the box.
    # For a local kind cluster, override this overlay to switch to NodePort
    # with a fixed nodePort and add a matching extraPortMappings to kind.
    deployment:
      podTemplateSpec:
        spec:
          containers:
            - name: proxy
              # Resources are intentionally minimal for kind on GitHub-hosted runners.
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
