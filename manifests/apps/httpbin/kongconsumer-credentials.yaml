apiVersion: v1
kind: Secret
metadata:
  name: demo-user-keyauth
  namespace: kong
  labels:
    # KIC recognises this label and treats the Secret as a key-auth credential.
    konghq.com/credential: key-auth
type: Opaque
stringData:
  # Public demo key. Production would use ESO + a real secret manager.
  key: demo-key-12345
