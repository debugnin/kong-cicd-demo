apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: demo-user
  namespace: httpbin
  annotations:
    kubernetes.io/ingress.class: kong
username: demo-user
credentials:
  - demo-user-keyauth
spec:
  controlPlaneRef:
    type: konnectNamespacedRef
    konnectNamespacedRef:
      name: kong
      namespace: kong
