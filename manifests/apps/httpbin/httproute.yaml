apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin
  namespace: httpbin
  annotations:
    # Bind plugins to this route. KIC reads this annotation and applies the
    # named KongPlugins (in the same namespace) to every rule in this route.
    konghq.com/plugins: rate-limit-status,key-auth-headers
spec:
  parentRefs:
    - name: kong
      namespace: kong
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers
      backendRefs:
        - name: httpbin
          port: 80
      timeouts:
        request: 10s
    - matches:
        - path:
            type: PathPrefix
            value: /status
      backendRefs:
        - name: httpbin
          port: 80
      timeouts:
        request: 10s
