kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kong-cicd-demo
nodes:
  - role: control-plane
    extraPortMappings:
      # Maps host port 8080 to NodePort 30080 on the gateway DataPlane Service.
      # GatewayConfiguration pins the proxy Service to NodePort 30080.
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
