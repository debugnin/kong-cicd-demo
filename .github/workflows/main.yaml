name: main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Serial execution: only one ephemeral CP "kong-cicd-demo" at a time.
concurrency:
  group: kong-cicd-main
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "1"
  TF_VAR_konnect_token: ${{ secrets.KONNECT_TOKEN }}

jobs:
  terraform-up:
    name: terraform apply (Konnect CP)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
          terraform_wrapper: false

      - name: terraform init
        run: terraform init -input=false

      - name: terraform apply
        run: terraform apply -auto-approve -input=false

      - name: Show outputs
        run: terraform output

  deploy-and-test:
    name: kind + Argo CD + functional tests
    runs-on: ubuntu-latest
    needs: terraform-up
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          config: infra/kind-config.yaml
          cluster_name: kong-cicd-demo

      - name: Bootstrap operator + Argo CD
        run: bash infra/bootstrap.sh

      - name: Create konnect-token Secret
        run: |
          kubectl create namespace kong --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n kong create secret generic konnect-token \
            --from-literal=token='${{ secrets.KONNECT_TOKEN }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Argo CD AppProjects + Applications
        run: |
          kubectl apply -f argocd/projects/
          kubectl apply -f argocd/app-platform.yaml -f argocd/app-httpbin.yaml

      - name: Install argocd CLI
        run: |
          curl -fsSL -o argocd \
            https://github.com/argoproj/argo-cd/releases/download/v2.13.0/argocd-linux-amd64
          sudo install -m 0755 argocd /usr/local/bin/

      - name: Wait for Argo CD Applications
        run: |
          # argocd CLI talks to the in-cluster service through kubectl port-forward
          # using --core mode (no API server auth needed; works inside the cluster).
          export ARGOCD_OPTS="--core"
          kubectl config set-context --current --namespace=argocd
          argocd app wait platform httpbin --health --sync --timeout 600

      - name: Wait for Gateway Programmed
        run: |
          kubectl -n kong wait gateway/kong \
            --for=condition=Programmed=True \
            --timeout=300s

      - name: Smoke test
        env:
          GATEWAY_URL: http://localhost:8080
        run: bash tests/smoke.sh

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Functional tests (k6)
        env:
          GATEWAY_URL: http://localhost:8080
          API_KEY: demo-key-12345
        run: k6 run tests/k6-functional.js

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "== argocd apps =="
          kubectl -n argocd get applications -o wide || true
          echo "== gateway =="
          kubectl -n kong get gateway -o yaml || true
          echo "== dataplane pods =="
          kubectl -n kong get pods -o wide || true
          echo "== events =="
          kubectl -n kong get events --sort-by=.lastTimestamp || true

  cleanup:
    name: terraform destroy
    runs-on: ubuntu-latest
    needs: [terraform-up, deploy-and-test]
    if: always()
    timeout-minutes: 10
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
          terraform_wrapper: false

      - name: terraform init
        run: terraform init -input=false

      - name: terraform destroy
        run: terraform destroy -auto-approve -input=false
