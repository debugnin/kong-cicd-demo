apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: httpbin
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kong-cicd-app-httpbin
  source:
    repoURL: https://github.com/debugnin/kong-cicd-demo
    targetRevision: main
    path: manifests/apps/httpbin
  destination:
    server: https://kubernetes.default.svc
    namespace: httpbin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
  # Gateway API admission populates these defaults (group/kind/weight) on
  # HTTPRoute. Without ignoring them, the route is perpetually OutOfSync.
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        - .spec.parentRefs[].group
        - .spec.parentRefs[].kind
        - .spec.rules[].backendRefs[].group
        - .spec.rules[].backendRefs[].kind
        - .spec.rules[].backendRefs[].weight
  # To enable Layer 3 (impersonation), uncomment after applying argocd/rbac/:
  # destinationServiceAccount: httpbin-deployer
